                                  <p class="text-gray-800 font-black text-lg">
                                      سيتم تحديث <span class="text-blue-600" x-text="selectedProducts.length"></span> منتج فقط
                                  </p>
                                  <p class="text-xs text-gray-500 mt-1">
                                      ✓ الوحدة الأساسية + وحدات البيع + السجل التاريخي
