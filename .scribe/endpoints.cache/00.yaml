                  opacity: 1;
              }
              
              .expense-header {
                  display: flex;
                  justify-content: space-between;
                  align-items: start;
                  margin-bottom: 1rem;
                  position: relative;
                  z-index: 1;
              }
              
              .expense-type {
                  font-family: 'Cairo', sans-serif;
                  font-size: 1.25rem;
                  font-weight: 700;
                  color: #1f2937;
              }
              
              .expense-amount {
                  font-family: 'Cairo', sans-serif;
                  font-size: 1.5rem;
                  font-weight: 800;
                  color: var(--danger-primary);
                  direction: ltr;
                  text-align: right;
              }
              
              .expense-details {
                  display: flex;
                  flex-direction: column;
                  gap: 0.75rem;
                  position: relative;
                  z-index: 1;
              }
              
              .expense-detail {
                  display: flex;
                  align-items: center;
                  gap: 0.5rem;
                  color: #6b7280;
                  font-size: 0.95rem;
              }
              
              .expense-detail svg {
                  width: 18px;
                  height: 18px;
                  color: var(--danger-primary);
                  flex-shrink: 0;
              }
              
              .expense-notes {
                  margin-top: 1rem;
                  padding: 1rem;
                  background: white;
                  border-radius: 10px;
                  color: #4b5563;
                  font-size: 0.9rem;
                  line-height: 1.6;
                  position: relative;
                  z-index: 1;
              }
              
              .expense-actions {
                  display: flex;
                  gap: 0.5rem;
                  margin-top: 1rem;
                  position: relative;
                  z-index: 1;
              }
              
              .action-icon-btn {
                  flex: 1;
                  padding: 0.75rem;
                  border: none;
                  border-radius: 8px;
                  cursor: pointer;
                  transition: all 0.3s ease;
                  display: flex;
                  align-items: center;
                  justify-content: center;
                  gap: 0.5rem;
                  font-weight: 600;
                  font-size: 0.9rem;
              }
              
              .edit-btn {
                  background: #dbeafe;
                  color: #1e40af;
              }
              
              .edit-btn:hover {
                  background: #bfdbfe;
              }
              
              .delete-btn {
                  background: #fee2e2;
                  color: #991b1b;
              }
              
              .delete-btn:hover {
                  background: #fecaca;
              }
              
              .empty-state {
                  text-align: center;
                  padding: 4rem 2rem;
                  color: #6b7280;
              }
              
              .empty-state svg {
                  width: 80px;
                  height: 80px;
                  margin: 0 auto 1.5rem;
                  opacity: 0.3;
              }
              
              .empty-state h3 {
                  font-size: 1.5rem;
                  font-weight: 700;
                  color: #1f2937;
                  margin-bottom: 0.5rem;
              }
              
              .pagination-container {
                  padding: 1.5rem 2rem;
                  border-top: 1px solid #e5e7eb;
              }
              
              .alert {
                  padding: 1rem;
                  border-radius: 12px;
                  margin-bottom: 1.5rem;
                  font-weight: 500;
              }
              
              .alert-success {
                  background: #dcfce7;
                  color: #166534;
                  border-left: 4px solid #10b981;
              }
              
              .alert-danger {
                  background: #fee2e2;
                  color: #991b1b;
                  border-left: 4px solid #dc2626;
              }
              
              .text-danger {
                  color: #dc2626;
                  font-size: 0.875rem;
                  margin-top: 0.25rem;
              }
              
              @media (max-width: 768px) {
                  .hero-content {
                      flex-direction: column;
                  }
                  
                  .hero-stats {
                      grid-template-columns: 1fr;
                      width: 100%;
                  }
                  
                  .expenses-grid {
                      grid-template-columns: 1fr;
                  }
                  
                  .expense-form {
                      grid-template-columns: 1fr;
                  }
              }
          </style>
